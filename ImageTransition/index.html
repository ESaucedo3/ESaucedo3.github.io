<html lang="en">
<head>
    <title>Image Transition</title>
    <meta name="author" content="Student Name" />

    <meta name="description" content="Student Name software developer Boise Idaho" />
    <meta name="keywords" content="C# HTML CSS programmer" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
	<!-- add embedded style sheet syntax -->
	<style>
		img{
			padding: 20px;
			width: 600px;
			transition: width 2s ease 0.5s
		}
		img:hover{
			width: 900px;
		}
	</style>
</head>
<body>
	<img src="BlueBird.jpg">
</body>
</html>
